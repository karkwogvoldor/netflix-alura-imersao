<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netflix</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;700&display=swap" rel="stylesheet">
    <meta name="description" content="Seleção de perfis do usuário">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Quem está assistindo?</h1>
    </header>

    <main>
        <section class="profiles" aria-label="Perfis de usuários">
            <ul>
                <li>
                    <button class="profile" type="button" aria-label="Selecionar Perfil 1">
                        <figure>
                            <img src="/assets/perfil-1.jpg" alt="Imagem de personagem estilo gótico">
                            <figcaption>Jerônimo</figcaption>
                        </figure>
                    </button>
                </li>
                 <li>
                    <button class="profile" type="button" aria-label="Selecionar Perfil 2">
                        <figure>
                            <img src="/assets/perfil-2.jpg" alt="Chaleira do musical A Bela e a Fera">
                            <figcaption>Lola Maria</figcaption>
                        </figure>
                    </button>
                </li>
                 <li>
                    <button class="profile" type="button" aria-label="Selecionar Perfil 3">
                        <figure>
                            <img src="/assets/perfil-3.jpg" alt="sub-zero nórdico">
                            <figcaption>Maria Isabel</figcaption>
                        </figure>
                    </button>
                </li>
                <li>
                    <button class="profile" type="button" aria-label="Selecionar Perfil 4">
                        <figure>
                            <img src="/assets/perfil-4.jpg" alt="Imagem John Wick explosivo">
                            <figcaption>John Wick</figcaption>
                        </figure>
                    </button>
                </li>
            </ul>
        </section>
    </main>

</body>
</html>
